<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorry Baby 💔</title>
  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      font-family: Arial, sans-serif;
      color: #333;
    }

    h1 {
      margin-top: 50px;
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    .cartoon {
      margin-top: 30px;
    }

    img {
      width: 200px;
      border-radius: 20px;
    }

    button {
      margin-top: 30px;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #ff6b81;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff4757;
    }
  </style>
</head>
<body>

  <h1>Sorry Baby 🥺💔</h1>
  <p>Mujhse galti ho gayi… please gussa mat ho na 😭❤️</p>

  <div class="cartoon">
    <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="cute cartoon sorry">
  </div>

  <button onclick="showMessage()">Click karo na 😔</button>

  <p id="extraMessage"></p>

  <script>
    function showMessage() {
      document.getElementById("extraMessage").innerHTML =
        "Main tumhe bahut miss kar rahi hoon… please baat kar lo na 🥺💖";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorry Baby 💔</title>

  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      font-family: Arial, sans-serif;
      color: #333;
      padding: 20px;
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    img {
      width: 200px;
      border-radius: 20px;
      margin-top: 20px;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background-color: #ff6b81;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff4757;
    }

    #messages {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <h1>Sorry Baby 🥺💔</h1>
  <p>Mujhse galti ho gayi… please gussa mat ho na 😭❤️</p>

  <!-- Cute GIF -->
  <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

  <br>

  <!-- Buttons -->
  <button onclick="saySorry()">I’m Really Sorry 💯😭</button>
  <button onclick="cuteMsg1()">Miss You So Much 💖🥺</button>
  <button onclick="cuteMsg2()">I Love You 💓💞</button>
  <button onclick="cuteMsg3()">Please Don’t Be Angry 😭💗</button>
  <button onclick="hug()">Send You a Big Hug 🫂💕</button>

  <!-- Output -->
  <div id="messages"></div>

  <script>
    function saySorry() {
      let text = "";
      for (let i = 1; i <= 100; i++) {
        text += i + ". I'm sorry 😭💔\n";
      }
      document.getElementById("messages").innerText = text;
    }

    function cuteMsg1() {
      document.getElementById("messages").innerHTML =
        "Main tumhe bahut miss kar rahi hoon… 🥺💖<br>Please baat kar lo na 😭💞";
    }

    function cuteMsg2() {
      document.getElementById("messages").innerHTML =
        "I really really 💓💞<br> Tum hi sab kuch ho 🥹💕";
    }

    function cuteMsg3() {
      document.getElementById("messages").innerHTML =
        "Gussa mat ho na please 😭💗<br>Main pakka sudhar jaungi 🥺💞";
    }

    function hug() {
      document.getElementById("messages").innerHTML =
        "<p>Yeh lo ek tight hug 🫂💕🥹</p>" +
        "<img src='https://media.giphy.com/media/l2QDM9Jnim1YVILXa/giphy.gif'>";
    }
  </script>

</body>
</html>
